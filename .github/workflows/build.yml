name: Build Artifacts

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub release"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag (required if publish_release=true)"
        required: false
        type: string
      release_name:
        description: "Release name override"
        required: false
        type: string
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Go server binaries (6 platform combos) ──────────────────────────────

  build-server:
    name: Server ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: 0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - run: go mod download

      - name: Build
        shell: bash
        run: |
          OUT="rizin-notebook-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -o "$OUT" -ldflags "-X main.NBVERSION=$(git rev-parse --short HEAD)"
          if [ "${{ matrix.goos }}" = "windows" ]; then mv "$OUT" "$OUT.exe"; fi

      - uses: actions/upload-artifact@v4
        with:
          name: rizin-notebook-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rizin-notebook-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error

  # ── Rizin core plugin (rz-notebook) — Windows ──────────────────────────

  build-rz-plugin-windows:
    name: rz-notebook (windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin sources
        shell: pwsh
        run: |
          if (!(Test-Path "rz-notebook\CMakeLists.txt")) {
            Write-Host "::error::rz-notebook sources are missing from repository checkout. Commit the rz-notebook directory."
            Get-ChildItem -Path .
            exit 1
          }

      - name: Install vcpkg packages
        run: vcpkg install protobuf-c:x64-windows

      - name: Download rizin SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/rizinorg/rizin/releases/download/v0.8.2/rizin-windows-shared64-v0.8.2.zip" `
            -OutFile rizin.zip
          7z x rizin.zip -orizin-sdk
          $cfg = Get-ChildItem -Path rizin-sdk -Recurse -Filter "RizinConfig.cmake" |
            Select-Object -First 1
          if (!$cfg) {
            Write-Host "::error::RizinConfig.cmake not found in rizin SDK"
            Get-ChildItem -Path rizin-sdk -Recurse | Select-Object -First 80 |
              ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          $prefix = $cfg.Directory.Parent.Parent.Parent.FullName
          Write-Host "Rizin prefix: $prefix"
          Add-Content -Path $env:GITHUB_ENV -Value "RIZIN_PREFIX=$prefix"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S rz-notebook -B rz-notebook/build `
            "-DRizin_ROOT=$env:RIZIN_PREFIX" `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build rz-notebook/build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: rz-notebook-windows-x64
          path: rz-notebook/build/Release/rz_notebook.dll
          if-no-files-found: error

  # ── Rizin core plugin (rz-notebook) — Linux ────────────────────────────

  build-rz-plugin-linux:
    name: rz-notebook (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin sources
        run: |
          test -f rz-notebook/CMakeLists.txt || {
            echo "::error::rz-notebook sources are missing from repository checkout. Commit the rz-notebook directory.";
            ls -la;
            exit 1;
          }

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build pkg-config \
            libprotobuf-c-dev libcurl4-openssl-dev

      - name: Build and install rizin
        run: |
          curl -L -o rizin-src.tar.xz \
            "https://github.com/rizinorg/rizin/releases/download/v0.8.2/rizin-src-v0.8.2.tar.xz"
          tar xf rizin-src.tar.xz
          cd rizin-*/
          meson setup build --prefix=/usr -Ddefault_library=shared
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - name: Configure and build
        run: |
          cmake -S rz-notebook -B rz-notebook/build -DCMAKE_BUILD_TYPE=Release
          cmake --build rz-notebook/build

      - uses: actions/upload-artifact@v4
        with:
          name: rz-notebook-linux-x64
          path: rz-notebook/build/librz_notebook.so
          if-no-files-found: error

  # ── Cutter plugin (cutter-notebook-plugin) — Windows ──────────────────

  build-cutter-plugin-windows:
    name: cutter-notebook-plugin (windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin sources
        shell: pwsh
        run: |
          if (!(Test-Path "cutter-notebook-plugin\CMakeLists.txt")) {
            Write-Host "::error::cutter-notebook-plugin sources are missing from repository checkout."
            Get-ChildItem -Path .
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt SDK
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          $qtOut = Join-Path $env:RUNNER_TEMP "Qt"
          python -m aqt install-qt windows desktop 6.7.2 win64_msvc2019_64 --outputdir $qtOut
          $qtDir = Join-Path $qtOut "6.7.2\msvc2019_64"
          if (!(Test-Path $qtDir)) {
            Write-Host "::error::Qt SDK install failed: $qtDir not found"
            exit 1
          }
          Add-Content -Path $env:GITHUB_ENV -Value "QT_DIR=$qtDir"

      - name: Download Cutter SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/rizinorg/cutter/releases/download/v2.4.1/Cutter-v2.4.1-Windows-x86_64.zip" `
            -OutFile cutter.zip
          7z x cutter.zip -oCutter
          $cutterRoot = Get-ChildItem -Path Cutter -Directory | Select-Object -First 1
          if (!$cutterRoot) {
            Write-Host "::error::Failed to extract Cutter SDK"
            exit 1
          }
          $hdr = Join-Path $cutterRoot.FullName "include\cutter\plugins\CutterPlugin.h"
          if (!(Test-Path $hdr)) {
            Write-Host "::error::Invalid Cutter SDK root: $($cutterRoot.FullName)"
            exit 1
          }
          Add-Content -Path $env:GITHUB_ENV -Value "CUTTER_DIR=$($cutterRoot.FullName)"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S cutter-notebook-plugin -B cutter-notebook-plugin/build `
            "-DCutter_DIR=$env:CUTTER_DIR" `
            "-DCMAKE_PREFIX_PATH=$env:QT_DIR" `
            -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build cutter-notebook-plugin/build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: cutter-notebook-plugin-windows-x64
          path: |
            cutter-notebook-plugin/build/Release/CutterNotebookPlugin.dll
            cutter-notebook-plugin/build/Release/CutterNotebookPlugin.pdb
          if-no-files-found: error

  # ── Package plugin sources ─────────────────────────────────────────────

  package-sources:
    name: Package plugin sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify source directories
        run: |
          test -d rz-notebook || { echo "::error::Missing rz-notebook directory"; exit 1; }
          test -d cutter-notebook-plugin || { echo "::error::Missing cutter-notebook-plugin directory"; exit 1; }

      - name: Create archives
        run: |
          zip -r rz-notebook-source.zip rz-notebook proto
          zip -r cutter-notebook-plugin-source.zip cutter-notebook-plugin

      - uses: actions/upload-artifact@v4
        with:
          name: plugin-sources
          path: |
            rz-notebook-source.zip
            cutter-notebook-plugin-source.zip
          if-no-files-found: error

  # ── Package checksums manifest ───────────────────────────────────────

  package-checksums:
    name: Package checksums
    runs-on: ubuntu-latest
    needs:
      - build-server
      - build-rz-plugin-windows
      - build-rz-plugin-linux
      - build-cutter-plugin-windows
      - package-sources
    steps:
      - uses: actions/download-artifact@v4

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          find . -type f \
            ! -name "SHA256SUMS.txt" \
            -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: SHA256SUMS.txt
          if-no-files-found: error

  # ── Publish GitHub Release ─────────────────────────────────────────────

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-server
      - build-rz-plugin-windows
      - build-rz-plugin-linux
      - build-cutter-plugin-windows
      - package-sources
      - package-checksums
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    steps:
      - uses: actions/download-artifact@v4

      - name: Resolve tag and name
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
            if [ -z "$TAG" ]; then echo "release_tag is required" >&2; exit 1; fi
            NAME="${{ inputs.release_name }}"
            if [ -z "$NAME" ]; then NAME="$TAG"; fi
          else
            TAG="${GITHUB_REF_NAME}"
            NAME="$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            rizin-notebook-*/*
            rz-notebook-*/*
            cutter-notebook-plugin-*/*
            plugin-sources/*
            release-checksums/*
