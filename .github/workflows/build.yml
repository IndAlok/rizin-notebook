name: Build Artifacts

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub release"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag (required if publish_release=true)"
        required: false
        type: string
      release_name:
        description: "Release name override"
        required: false
        type: string
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build-notebook:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: Download deps
        run: go mod download

      - name: Build binary
        shell: bash
        run: |
          OUT="rz-notebook-${GOOS}-${GOARCH}"
          go build -o "$OUT" -ldflags "-X main.NBVERSION=$(git rev-parse --short HEAD)"
          if [ "$GOOS" = "windows" ]; then
            mv "$OUT" "$OUT.exe"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rz-notebook-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rz-notebook-${{ matrix.goos }}-${{ matrix.goarch }}*

  package-plugin-source:
    name: Package plugin source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          zip -r cutter-notebook-plugin-source.zip cutter-notebook-plugin

      - name: Upload plugin source
        uses: actions/upload-artifact@v4
        with:
          name: cutter-notebook-plugin-source
          path: cutter-notebook-plugin-source.zip

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-notebook, package-plugin-source]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
            if [ -z "$TAG" ]; then
              echo "release_tag is required when publish_release=true" >&2
              exit 1
            fi
            NAME="${{ inputs.release_name }}"
            if [ -z "$NAME" ]; then
              NAME="$TAG"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            NAME="$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            rz-notebook-*/*
            cutter-notebook-plugin-source/*